name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npx vitest run test/fixtures/
      # TODO: Add runtime sandbox isolation for fixture tests (e.g. network/fs restrictions)
      - run: npx vitest run test/reference/

  harness-protection:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check protected paths
        run: |
          # Check if protected files were modified
          PROTECTED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^(spec/fixtures/|test/reference/|eslint\.config)' || true)
          if [ -n "$PROTECTED_FILES" ]; then
            # Check for harness-amendment trailer or label
            if ! git log origin/${{ github.base_ref }}...HEAD --format=%B | grep -q "harness-amendment"; then
              echo "::error::Protected harness files modified without 'harness-amendment' trailer:"
              echo "$PROTECTED_FILES"
              exit 1
            fi
          fi
